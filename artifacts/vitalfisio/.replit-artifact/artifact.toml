kind = "web"
previewPath = "/"
title = "Agenda VitalFisio"
version = "1.0.0"
id = "artifacts/vitalfisio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22415

[services.development]
run = "pnpm --filter @workspace/vitalfisio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vitalfisio", "run", "build" ]
publicDir = "artifacts/vitalfisio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22415"
BASE_PATH = "/"
